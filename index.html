<script>
    let habits = JSON.parse(localStorage.getItem('habits')) || [];
    let alertLog = JSON.parse(localStorage.getItem('alertLog')) || [];
    let checkInterval;
    let currentTimeRange = 'now';
    let deferredPrompt;
    let swRegistration = null; // Store Service Worker registration

    // Service Worker Registration - FIXED
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js', { scope: './' })
                .then(registration => {
                    swRegistration = registration; // Save registration globally
                    console.log('✅ Service Worker registered:', registration);
                    addToAlertLog('Service Worker active - Ready for notifications');
                    
                    registration.addEventListener('updatefound', () => {
                        const newWorker = registration.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'activated') {
                                console.log('Service Worker updated');
                            }
                        });
                    });
                })
                .catch(err => {
                    console.error('❌ Service Worker failed:', err);
                    addToAlertLog('Service Worker failed: ' + err.message);
                });
        });
    }

    // PWA Install Prompt
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBanner').classList.add('show');
    });

    function installApp() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    addToAlertLog('App installed to home screen');
                    document.getElementById('installBanner').classList.remove('show');
                }
                deferredPrompt = null;
            });
        } else {
            alert('To install:\n\n1. Tap browser menu (⋮)\n2. Select "Add to Home Screen"\n3. Tap "Add"');
        }
    }

    function init() {
        updateCurrentTime();
        setInterval(updateCurrentTime, 1000);
        renderAllTabs();
        checkMissedHabits();
        updatePermissionStatus();
        
        checkInterval = setInterval(() => {
            checkReminders();
            checkMissedHabits();
            renderNowTab();
        }, 30000);
        
        checkReminders();
        addToAlertLog('App started');
    }

    function addToAlertLog(message) {
        const timestamp = new Date().toLocaleString();
        alertLog.unshift({ time: timestamp, message: message });
        if (alertLog.length > 30) alertLog = alertLog.slice(0, 30);
        localStorage.setItem('alertLog', JSON.stringify(alertLog));
        updateAlertLogDisplay();
    }

    function updateAlertLogDisplay() {
        const container = document.getElementById('alertLogContent');
        if (alertLog.length === 0) {
            container.innerHTML = 'No alerts yet';
        } else {
            container.innerHTML = alertLog.map(log => 
                `<div class="alert-item"><strong>${log.time}</strong><br>${log.message}</div>`
            ).join('');
        }
    }

    function updateCurrentTime() {
        const now = new Date();
        const timeString = now.toLocaleTimeString('en-US', { 
            hour: '2-digit', 
            minute: '2-digit',
            hour12: true 
        });
        document.getElementById('currentTime').textContent = `${timeString}`;
    }

    // FIXED NOTIFICATION FUNCTIONS
    
    // Send notification using Service Worker
    async function sendNotification(title, options) {
        try {
            if (!swRegistration) {
                // Wait for Service Worker to be ready
                swRegistration = await navigator.serviceWorker.ready;
            }
            
            // Use Service Worker registration to show notification
            await swRegistration.showNotification(title, {
                badge: './icon-192.png',
                icon: './icon-192.png',
                vibrate: [200, 100, 200],
                requireInteraction: false,
                ...options
            });
            
            return true;
        } catch (error) {
            console.error('Notification error:', error);
            addToAlertLog('Notification error: ' + error.message);
            
            // Fallback to regular notification if SW fails
            try {
                new Notification(title, options);
                return true;
            } catch (fallbackError) {
                console.error('Fallback notification error:', fallbackError);
                return false;
            }
        }
    }

    function openPermissionModal() {
        document.getElementById('permissionModal').classList.add('show');
        updatePermissionStatus();
    }

    function closePermissionModal() {
        document.getElementById('permissionModal').classList.remove('show');
    }

    function updatePermissionStatus() {
        const statusDiv = document.getElementById('permissionStatus');
        const statusText = document.getElementById('statusText');
        
        if (!("Notification" in window)) {
            statusText.textContent = 'Not Supported';
            statusDiv.className = 'permission-status denied';
            return;
        }

        const permission = Notification.permission;
        statusText.textContent = permission.charAt(0).toUpperCase() + permission.slice(1);
        
        if (permission === 'granted') {
            statusDiv.className = 'permission-status granted';
        } else if (permission === 'denied') {
            statusDiv.className = 'permission-status denied';
        } else {
            statusDiv.className = 'permission-status';
        }
    }

    async function requestNotificationPermission() {
        if (!("Notification" in window)) {
            alert("Your device doesn't support notifications");
            return;
        }

        try {
            const permission = await Notification.requestPermission();
            updatePermissionStatus();
            
            if (permission === "granted") {
                addToAlertLog('✅ Notification permission granted');
                
                // Send welcome notification using SW
                await sendNotification("🎉 Notifications Enabled!", {
                    body: "You'll now receive habit reminders. Click 'Test Notification' to verify!",
                    tag: 'welcome'
                });
                
            } else {
                alert('Permission denied. Enable in:\n\nSettings → Browser → Notifications');
                addToAlertLog('❌ Notification permission denied');
            }
        } catch (error) {
            alert('Error requesting permission: ' + error.message);
            addToAlertLog('Permission error: ' + error.message);
        }
    }

    async function testNotification() {
        if (Notification.permission !== "granted") {
            alert('Please grant notification permission first!');
            await requestNotificationPermission();
            return;
        }

        const now = new Date().toLocaleTimeString();
        const sent = await sendNotification("🧪 Test Notification", {
            body: `Working perfectly! Sent at ${now}`,
            tag: 'test',
            requireInteraction: false
        });

        if (sent) {
            addToAlertLog('✅ Test notification sent at ' + now);
            alert('✅ Test notification sent! Check your notification panel.');
        } else {
            alert('❌ Failed to send notification. Check console for details.');
        }
    }

    async function scheduleTestReminder() {
        if (Notification.permission !== "granted") {
            alert('Please grant notification permission first!');
            await requestNotificationPermission();
            return;
        }

        setTimeout(async () => {
            await sendNotification("⏰ Scheduled Test Alert", {
                body: "This is your 1-minute test reminder! Your alerts are working!",
                tag: 'scheduled-test',
                requireInteraction: true
            });
            addToAlertLog('⏰ Scheduled test alert fired');
        }, 60000);

        alert('✅ Test reminder scheduled for 1 minute from now. Keep the app open!');
        addToAlertLog('⏰ Test reminder scheduled for 1 minute');
    }

    // Sync Functions
    function openSyncModal() {
        document.getElementById('syncModal').classList.add('show');
    }

    function closeSyncModal() {
        document.getElementById('syncModal').classList.remove('show');
    }

    function generateExportCode() {
        const data = {
            habits: habits,
            exportDate: new Date().toISOString(),
            version: '1.0'
        };
        const code = btoa(JSON.stringify(data));
        document.getElementById('exportCode').textContent = code;
        addToAlertLog('Sync code generated');
    }

    function copyToClipboard() {
        const code = document.getElementById('exportCode').textContent;
        if (code === 'Click "Generate Code"') {
            alert('Please generate a code first!');
            return;
        }
        
        if (navigator.clipboard) {
            navigator.clipboard.writeText(code).then(() => {
                alert('✅ Code copied! Paste on another device to sync.');
                addToAlertLog('Code copied to clipboard');
            });
        } else {
            const textArea = document.createElement('textarea');
            textArea.value = code;
            textArea.style.position = 'fixed';
            textArea.style.left = '-999999px';
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                alert('✅ Code copied!');
                addToAlertLog('Code copied');
            } catch (err) {
                alert('Copy failed. Please copy manually from the box.');
            }
            document.body.removeChild(textArea);
        }
    }

    function importData() {
        const code = document.getElementById('importCode').value.trim();
        
        if (!code) {
            alert('Please paste a sync code!');
            return;
        }

        try {
            const decoded = JSON.parse(atob(code));
            
            if (!decoded.habits || !Array.isArray(decoded.habits)) {
                throw new Error('Invalid code');
            }

            const choice = confirm('Merge with existing habits?\n\nOK = Merge (keep both)\nCancel = Replace (delete current)');
            
            if (choice) {
                const newHabits = decoded.habits.map(h => ({
                    ...h,
                    id: Date.now() + Math.random()
                }));
                habits = [...habits, ...newHabits];
                alert(`✅ Merged! Added ${newHabits.length} habits.`);
            } else {
                habits = decoded.habits;
                alert(`✅ Imported ${habits.length} habits!`);
            }

            saveData();
            renderAllTabs();
            closeSyncModal();
            document.getElementById('importCode').value = '';
            addToAlertLog(`Imported ${decoded.habits.length} habits`);
            
        } catch (error) {
            alert('❌ Invalid sync code!');
            addToAlertLog('Import failed: Invalid code');
        }
    }

    // Tab Functions
    function switchTab(tabName) {
        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        event.target.classList.add('active');

        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        document.getElementById(`tab-${tabName}`).classList.add('active');

        if (tabName === 'stats') {
            renderStats();
            updateAlertLogDisplay();
        } else if (tabName === 'now') {
            renderNowTab();
        }
    }

    function filterByTimeRange(range) {
        currentTimeRange = range;
        document.querySelectorAll('.time-slot').forEach(slot => slot.classList.remove('active'));
        event.target.classList.add('active');
        renderNowTab();
    }

    function getHabitsForTimeRange(range) {
        if (range === 'all') return habits.filter(h => h.reminderHour !== null);
        
        const now = new Date();
        const currentHour = now.getHours();
        const currentMinute = now.getMinutes();
        
        return habits.filter(habit => {
            if (habit.reminderHour === null || habit.reminderHour === undefined) return false;
            
            const habitHour = parseInt(habit.reminderHour);
            
            if (range === 'now') {
                const timeDiff = Math.abs((habitHour * 60 + parseInt(habit.reminderMinute || 0)) - (currentHour * 60 + currentMinute));
                return timeDiff <= 60;
            } else if (range === 'morning') {
                return habitHour >= 5 && habitHour < 12;
            } else if (range === 'afternoon') {
                return habitHour >= 12 && habitHour < 17;
            } else if (range === 'evening') {
                return habitHour >= 17 && habitHour < 22;
            } else if (range === 'night') {
                return habitHour >= 22 || habitHour < 5;
            }
            return false;
        });
    }

    function renderNowTab() {
        const container = document.getElementById('habitsContainerNow');
        const relevantHabits = getHabitsForTimeRange(currentTimeRange);
        
        document.getElementById('nowBadge').textContent = relevantHabits.length;
        
        if (relevantHabits.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <h3>No habits for this time</h3>
                    <p>Select different time period or add habits with times.</p>
                </div>
            `;
        } else {
            container.innerHTML = relevantHabits.map(h => renderHabitCard(h, true)).join('');
        }
    }

    function addHabit() {
        const name = document.getElementById('habitName').value.trim();
        const type = document.getElementById('habitType').value;
        const why = document.getElementById('habitWhy').value.trim();
        const summary = document.getElementById('habitSummary').value.trim();
        const hourInput = document.getElementById('reminderHour');
        const minuteInput = document.getElementById('reminderMinute');
        const earlyReminder = document.getElementById('earlyReminder').value;
        
        if (!name) {
            alert('Please enter habit name!');
            return;
        }

        if (!why) {
            alert('Please write why you started this habit!');
            return;
        }

        let reminderHour = null;
        let reminderMinute = null;
        
        if (hourInput.value !== '') {
            reminderHour = parseInt(hourInput.value);
            reminderMinute = parseInt(minuteInput.value) || 0;
            
            if (isNaN(reminderHour) || reminderHour < 0 || reminderHour > 23) {
                alert('Invalid hour (0-23)');
                return;
            }
            
            if (isNaN(reminderMinute) || reminderMinute < 0 || reminderMinute > 59) {
                alert('Invalid minute (0-59)');
                return;
            }
        }

        const newHabit = {
            id: Date.now(),
            name: name,
            type: type,
            why: why,
            summary: summary || why.substring(0, 100),
            streak: 0,
            longestStreak: 0,
            createdDate: new Date().toISOString(),
            lastCheckDate: null,
            checkHistory: [],
            reminderHour: reminderHour,
            reminderMinute: reminderMinute,
            earlyReminder: parseInt(earlyReminder) || 0
        };

        habits.push(newHabit);
        saveData();
        renderAllTabs();
        
        // Clear form
        document.getElementById('habitName').value = '';
        document.getElementById('habitWhy').value = '';
        document.getElementById('habitSummary').value = '';
        document.getElementById('reminderHour').value = '';
        document.getElementById('reminderMinute').value = '0';
        document.getElementById('earlyReminder').value = '0';
        
        // Switch to now tab
        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab')[0].classList.add('active');
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        document.getElementById('tab-now').classList.add('active');
        renderNowTab();
        
        addToAlertLog(`Created: ${name}` + (reminderHour !== null ? ` @ ${formatTime(reminderHour, reminderMinute)}` : ''));
        alert('✅ Habit created successfully!');
    }

    function toggleMotivation(id) {
        const element = document.getElementById(`motivation-full-${id}`);
        element.classList.toggle('show');
    }

    // FIXED REMINDER CHECK FUNCTION
    async function checkReminders() {
        if (Notification.permission !== "granted") return;

        const now = new Date();
        const currentHour = now.getHours();
        const currentMinute = now.getMinutes();
        const currentTimeKey = `${currentHour}:${currentMinute}`;
        
        const lastNotificationTime = localStorage.getItem('lastNotificationTime');
        if (lastNotificationTime === currentTimeKey) return;

        let notificationSent = false;
        
        for (const habit of habits) {
            if (habit.reminderHour === null || habit.reminderHour === undefined) continue;

            const habitHour = parseInt(habit.reminderHour);
            const habitMinute = parseInt(habit.reminderMinute || 0);

            // Check main reminder
            if (habitHour === currentHour && habitMinute === currentMinute) {
                await showNotification(habit, false);
                notificationSent = true;
            }

            // Check early reminder
            if (habit.earlyReminder > 0) {
                const reminderDate = new Date();
                reminderDate.setHours(habitHour);
                reminderDate.setMinutes(habitMinute);
                
                const earlyTime = new Date(reminderDate.getTime() - (habit.earlyReminder * 60000));
                
                if (earlyTime.getHours() === currentHour && earlyTime.getMinutes() === currentMinute) {
                    await showNotification(habit, true);
                    notificationSent = true;
                }
            }
        }

        if (notificationSent) {
            localStorage.setItem('lastNotificationTime', currentTimeKey);
        }
    }

    // FIXED SHOW NOTIFICATION FUNCTION
    async function showNotification(habit, isEarly) {
        const title = isEarly ? `⏰ ${habit.name}` : `🎯 ${habit.name}`;
        const body = isEarly ?
            `In ${habit.earlyReminder} min! ${habit.summary}` :
            `Time now! ${habit.summary} | Streak: ${habit.streak} 🔥`;

        const sent = await sendNotification(title, {
            body: body,
            tag: `habit-${habit.id}-${isEarly ? 'early' : 'main'}`,
            requireInteraction: true,
            data: { habitId: habit.id }
        });

        if (sent) {
            addToAlertLog(`🔔 Alert: ${habit.name} @ ${formatTime(habit.reminderHour, habit.reminderMinute)}`);
        }
    }

    async function checkMissedHabits() {
        const now = new Date();
        
        for (const habit of habits) {
            if (!habit.lastCheckDate) continue;
            
            const lastCheck = new Date(habit.lastCheckDate);
            const daysDiff = Math.floor((now - lastCheck) / (1000 * 60 * 60 * 24));
            
            if (daysDiff >= 2) {
                if (!habit.isMissed) {
                    habit.isMissed = true;
                    
                    if (Notification.permission === "granted") {
                        await sendNotification(`⚠️ ${habit.name}`, {
                            body: `${daysDiff} days missed! ${habit.summary}`,
                            tag: `missed-${habit.id}`,
                            requireInteraction: true
                        });
                        addToAlertLog(`⚠️ Missed: ${habit.name} (${daysDiff}d)`);
                    }
                }
            } else {
                habit.isMissed = false;
            }
        }
        
        saveData();
    }

    function markSuccess(id) {
        const habit = habits.find(h => h.id === id);
        const today = new Date().toDateString();
        
        if (habit.lastCheckDate === today) {
            alert('Already checked today!');
            return;
        }

        const lastCheck = habit.lastCheckDate ? new Date(habit.lastCheckDate) : null;
        const now = new Date();
        const daysDiff = lastCheck ? Math.floor((now - lastCheck) / (1000 * 60 * 60 * 24)) : 0;

        if (daysDiff > 1) {
            habit.streak = 1;
        } else {
            habit.streak++;
        }

        if (habit.streak > habit.longestStreak) {
            habit.longestStreak = habit.streak;
        }
        
        habit.lastCheckDate = today;
        habit.checkHistory.push({ date: today, success: true });
        habit.isMissed = false;

        saveData();
        renderAllTabs();
        addToAlertLog(`✅ ${habit.name} - Streak: ${habit.streak}`);
    }

    function markFail(id) {
        const habit = habits.find(h => h.id === id);
        const today = new Date().toDateString();
        
        if (habit.lastCheckDate === today) {
            alert('Already checked today!');
            return;
        }

        habit.streak = 0;
        habit.lastCheckDate = today;
        habit.checkHistory.push({ date: today, success: false });
        habit.isMissed = false;

        saveData();
        renderAllTabs();
        addToAlertLog(`❌ ${habit.name} - Streak reset`);
    }

    function deleteHabit(id) {
        const habit = habits.find(h => h.id === id);
        if (confirm(`Delete "${habit.name}"?`)) {
            habits = habits.filter(h => h.id !== id);
            saveData();
            renderAllTabs();
            addToAlertLog(`🗑️ Deleted: ${habit.name}`);
        }
    }

    function generateCalendar(habit) {
        const days = [];
        const today = new Date();
        
        for (let i = 27; i >= 0; i--) {
            const date = new Date(today);
            date.setDate(date.getDate() - i);
            const dateString = date.toDateString();
            
            const check = habit.checkHistory.find(h => h.date === dateString);
            
            let className = 'calendar-day';
            if (check) className += check.success ? ' success' : ' fail';
            if (i === 0) className += ' today';
            
            days.push(`<div class="${className}">${check ? (check.success ? '✓' : '✗') : ''}</div>`);
        }
        
        return days.join('');
    }

    function formatTime(hour, minute) {
        if (hour === null || hour === undefined) return 'No time';
        
        const h = parseInt(hour);
        const m = parseInt(minute || 0);
        const period = h >= 12 ? 'PM' : 'AM';
        const displayHour = h === 0 ? 12 : (h > 12 ? h - 12 : h);
        
        return `${displayHour}:${String(m).padStart(2, '0')} ${period}`;
    }

    function renderHabitCard(habit, highlight = false) {
        const progressPercent = Math.min((habit.streak / 30) * 100, 100);
        const timeDisplay = formatTime(habit.reminderHour, habit.reminderMinute);
        const reminderText = habit.reminderHour !== null ? 
            `⏰ ${timeDisplay}${habit.earlyReminder > 0 ? ` (-${habit.earlyReminder}m)` : ''}` : 
            '⏰ No time set';
        
        return `
            <div class="habit-card ${habit.type} ${habit.isMissed ? 'missed' : ''} ${highlight ? 'highlight' : ''}">
                <div class="habit-header">
                    <div class="habit-title">${habit.name}</div>
                    <div class="habit-type ${habit.type}">
                        ${habit.type === 'good' ? '✅' : '🚫'}
                    </div>
                </div>

                ${habit.isMissed ? `<div class="missed-alert">⚠️ 2+ days missed!</div>` : ''}

                <div class="motivation-summary" onclick="toggleMotivation(${habit.id})">
                    <div class="motivation-label">💡 WHY (tap to expand)</div>
                    <div class="motivation-text">${habit.summary}</div>
                </div>

                <div class="motivation-full" id="motivation-full-${habit.id}">
                    <h4>🎯 Full Motivation:</h4>
                    <p style="line-height: 1.6; color: #333;">${habit.why}</p>
                    <button class="close-motivation" onclick="toggleMotivation(${habit.id})">Close</button>
                </div>

                <div class="reminder-info">${reminderText}</div>

                <div class="streak-info">
                    <div class="streak-number">${habit.streak}</div>
                    <div class="streak-label">Day Streak 🔥</div>
                </div>

                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${progressPercent}%"></div>
                </div>

                <div style="text-align: center; color: #666; margin: 10px 0; font-size: 0.85em;">
                    🏆 Best: ${habit.longestStreak} | 📅 ${new Date(habit.createdDate).toLocaleDateString()}
                </div>

                ${habit.streak >= 21 ? `<div class="success-zone">🎉 ${habit.streak} days!</div>` : ''}

                <div class="calendar-container">
                    <div class="calendar-header">📅 Last 28 Days</div>
                    <div class="calendar-grid">${generateCalendar(habit)}</div>
                </div>

                <div class="habit-actions">
                    <button class="btn-success" onclick="markSuccess(${habit.id})">✓ Done</button>
                    <button class="btn-fail" onclick="markFail(${habit.id})">✗ Miss</button>
                    <button class="btn-delete" onclick="deleteHabit(${habit.id})">🗑️</button>
                </div>
            </div>
        `;
    }

    function renderAllTabs() {
        renderNowTab();

        const allContainer = document.getElementById('habitsContainerAll');
        allContainer.innerHTML = habits.length === 0 ?
            `<div class="empty-state"><h3>No habits yet</h3><p>Tap "Add" to create one!</p></div>` :
            habits.map(h => renderHabitCard(h)).join('');

        const goodHabits = habits.filter(h => h.type === 'good');
        document.getElementById('habitsContainerGood').innerHTML = goodHabits.length === 0 ?
            `<div class="empty-state"><h3>No building habits</h3></div>` :
            goodHabits.map(h => renderHabitCard(h)).join('');

        const badHabits = habits.filter(h => h.type === 'bad');
        document.getElementById('habitsContainerBad').innerHTML = badHabits.length === 0 ?
            `<div class="empty-state"><h3>No breaking habits</h3></div>` :
            badHabits.map(h => renderHabitCard(h)).join('');
    }

    function renderStats() {
        const total = habits.length;
        const totalCheckins = habits.reduce((sum, h) => sum + h.checkHistory.length, 0);
        const avgStreak = total > 0 ? Math.round(habits.reduce((sum, h) => sum + h.streak, 0) / total) : 0;
        const longest = total > 0 ? Math.max(...habits.map(h => h.longestStreak)) : 0;
        const today = habits.filter(h => h.lastCheckDate === new Date().toDateString()).length;
        const missed = habits.filter(h => h.isMissed).length;

        document.getElementById('statsContainer').innerHTML = `
            <div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">Total</div></div>
            <div class="stat-card"><div class="stat-number">${today}</div><div class="stat-label">Today</div></div>
            <div class="stat-card"><div class="stat-number">${avgStreak}</div><div class="stat-label">Avg Streak</div></div>
            <div class="stat-card"><div class="stat-number">${longest}</div><div class="stat-label">Best</div></div>
            <div class="stat-card"><div class="stat-number">${totalCheckins}</div><div class="stat-label">Check-ins</div></div>
            <div class="stat-card"><div class="stat-number">${missed}</div><div class="stat-label">⚠️ Missed</div></div>
        `;
    }

    function saveData() {
        localStorage.setItem('habits', JSON.stringify(habits));
    }

    document.addEventListener('DOMContentLoaded', init);
    init();
</script>
